<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f2f2f7;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .calc-wrapper {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    width: 100%; max-width: 360px;
    overflow: hidden;
  }
  .display {
    background: #1c1c1e;
    color: #fff; padding: 24px 20px;
    font-size: 2.6rem; font-weight: 300;
    text-align: right; min-height: 100px;
    word-break: break-all;
    display: flex; align-items: flex-end; justify-content: flex-end;
    flex-direction: column;
  }
  .display .small { font-size: 1rem; color: #a1a1a6; }
  .keys {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: #c7c7cc;
  }
  .key {
    border: none; outline: none; font-size: 1.4rem; padding: 22px;
    background: #f2f2f7; cursor: pointer; transition: filter .1s;
  }
  .key:active { filter: brightness(0.92); }
  .key.wide { grid-column: span 2; }
  .key.light { background: #e5e5ea; }
  .key.accent { background: #ff9500; color: #fff; }

  /* Overlay screens */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); display: flex;
    align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }
  .modal {
    background: #fff; width: 90%; max-width: 380px;
    border-radius: 20px; padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center; transform: translateY(20px);
    transition: transform .3s;
  }
  .overlay.active .modal { transform: translateY(0); }
  .modal h2 { margin-bottom: 8px; font-size: 1.4rem; }
  .modal p { color: #636366; margin-bottom: 18px; font-size: .95rem; }
  .modal input, .modal select {
    width: 100%; padding: 12px 14px; margin-bottom: 12px;
    border: 1px solid #c7c7cc; border-radius: 12px; font-size: 1rem;
  }
  .modal button {
    width: 100%; padding: 14px; border-radius: 12px;
    border: none; font-size: 1.05rem; cursor: pointer;
    margin-top: 4px;
  }
  .btn-primary { background: #007aff; color: #fff; }
  .btn-success { background: #34c759; color: #fff; }

  /* Success / Tip */
  .checkmark { font-size: 3rem; margin-bottom: 6px; }
  .tip-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .tip-btn { padding: 12px; border-radius: 10px; border: 1px solid #007aff; background: transparent; color: #007aff; font-size: 1rem; cursor: pointer; }
  .tip-btn:hover { background: rgba(0,122,255,0.08); }
  .tip-custom { margin-bottom: 8px; }

  /* Loader */
  .spinner {
    width: 40px; height: 40px; border: 4px solid #e5e5ea;
    border-top-color: #007aff; border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="calc-wrapper">
  <div class="display" id="display"><div class="small" id="small"></div><span id="main">0</span></div>
  <div class="keys">
    <button class="key light" onclick="ac()">AC</button>
    <button class="key light" onclick="pm()">+/-</button>
    <button class="key light" onclick="perc()">%</button>
    <button class="key accent" onclick="op('/')">÷</button>

    <button class="key" onclick="num(7)">7</button>
    <button class="key" onclick="num(8)">8</button>
    <button class="key" onclick="num(9)">9</button>
    <button class="key accent" onclick="op('*')">×</button>

    <button class="key" onclick="num(4)">4</button>
    <button class="key" onclick="num(5)">5</button>
    <button class="key" onclick="num(6)">6</button>
    <button class="key accent" onclick="op('-')">−</button>

    <button class="key" onclick="num(1)">1</button>
    <button class="key" onclick="num(2)">2</button>
    <button class="key" onclick="num(3)">3</button>
    <button class="key accent" onclick="op('+')">+</button>

    <button class="key wide" onclick="num(0)">0</button>
    <button class="key" onclick="dot()">.</button>
    <button class="key accent" onclick="eq()">=</button>
  </div>
</div>

<!-- Payment Modal -->
<div class="overlay" id="payOverlay">
  <div class="modal">
    <h2>Unlock Answer</h2>
    <p>For just $0.99, reveal your result immediately.</p>
    <input type="text" id="cardName" placeholder="Cardholder Name">
    <input type="text" id="cardNum" placeholder="Card Number">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
      <input type="text" id="cvv" placeholder="CVV" maxlength="4">
    </div>
    <button class="btn-primary" onclick="pay()">Pay $0.99</button>
  </div>
</div>

<!-- Processing -->
<div class="overlay" id="procOverlay">
  <div class="modal" style="background:none;box-shadow:none;color:#fff;padding:0">
    <div class="spinner"></div>
    <p>Processing payment...</p>
  </div>
</div>

<!-- Success -->
<div class="overlay" id="succOverlay">
  <div class="modal">
    <div class="checkmark">✅</div>
    <h2>Purchase Successful!</h2>
    <p>Your answer is almost ready.</p>
    <button class="btn-primary" onclick="showTip()">Continue</button>
  </div>
</div>

<!-- Tip Modal -->
<div class="overlay" id="tipOverlay">
  <div class="modal">
    <h2>Add a Tip</h2>
    <p>Support our hardworking algorithms.</p>
    <div class="tip-options">
      <button class="tip-btn" onclick="addTip(0.99)">$0.99</button>
      <button class="tip-btn" onclick="addTip(2.99)">$2.99</button>
      <button class="tip-btn" onclick="addTip(4.99)">$4.99</button>
    </div>
    <input class="tip-custom" type="text" id="customTip" placeholder="Custom amount (optional)">
    <button class="btn-success" onclick="addTip(0)">No tip — just show answer</button>
  </div>
</div>

<script>
let main = '0', small = '';
let a = '', b = '', operator = '';
let currentState = 'a';
let pendingResult = '';

function update() {
  document.getElementById('main').textContent = main;
  document.getElementById('small').textContent = small;
}
function ac() { a=''; b=''; operator=''; currentState='a'; main='0'; small=''; update(); }
function num(n) {
  if (currentState==='a') { a = a==='0' ? String(n) : a+String(n); main=a; }
  else { b = b==='0' ? String(n) : b+String(n); main=b; }
  update();
}
function dot() {
  const target = currentState==='a' ? a : b;
  if (target.includes('.')) return;
  if (currentState==='a') { a += '.'; main=a; }
  else { b += '.'; main=b; }
  update();
}
function pm() {
  if (currentState==='a') { if (!a) return; a = String(parseFloat(a)*-1); main=a; }
  else { if (!b) return; b = String(parseFloat(b)*-1); main=b; }
  update();
}
function perc() {
  if (currentState==='a') { if (!a) return; a = String(parseFloat(a)/100); main=a; }
  else { if (!b) return; b = String(parseFloat(b)/100); main=b; }
  update();
}
function op(sign) {
  if (!a) return;
  operator = sign;
  currentState = 'b';
  small = a + ' ' + (sign==='/'?'÷':sign==='*'?'×':sign==='-'?'−':'+');
  b=''; main='0';
  update();
}

// INTENTIONALLY WRONG MATH (close but never right)
function wrongMath(real) {
  const r = Math.random();
  let wrong;
  if (r < 0.33) {
    // off by a small random amount
    wrong = real + (Math.random()*10 - 5);
  } else if (r < 0.66) {
    // round in weird way, maybe add/subtract 1-3
    wrong = real + (Math.random() > 0.5 ? Math.ceil(Math.random()*3) : -Math.ceil(Math.random()*3));
  } else {
    // slight percentage tweak
    wrong = real * (1 + (Math.random()*0.06 - 0.03));
  }
  // clean up
  wrong = parseFloat(wrong.toFixed(6));
  if (Number.isInteger(wrong)) return String(wrong);
  return String(parseFloat(wrong.toFixed(4)));
}

function calculate() {
  const A = parseFloat(a||0), B = parseFloat(b||0);
  let real = 0;
  switch(operator) {
    case '+': real = A + B; break;
    case '-': real = A - B; break;
    case '*': real = A * B; break;
    case '/': real = B===0 ? NaN : A/B; break;
    default: return;
  }
  if (!isFinite(real) || isNaN(real)) return 'Error';
  return wrongMath(real);
}

function eq() {
  if (!operator || !b) return;
  pendingResult = calculate();
  document.getElementById('payOverlay').classList.add('active');
}

function pay() {
  // Accept whatever garbage they type, no validation needed
  document.getElementById('payOverlay').classList.remove('active');
  document.getElementById('procOverlay').classList.add('active');
  setTimeout(() => {
    document.getElementById('procOverlay').classList.remove('active');
    document.getElementById('succOverlay').classList.add('active');
  }, 2200);
}

function showTip() {
  document.getElementById('succOverlay').classList.remove('active');
  document.getElementById('tipOverlay').classList.add('active');
}

function addTip(amount) {
  document.getElementById('tipOverlay').classList.remove('active');
  document.getElementById('procOverlay').classList.add('active');
  setTimeout(() => {
    document.getElementById('procOverlay').classList.remove('active');
    a = ''; b = ''; operator = ''; currentState = 'a'; small = '';
    main = pendingResult;
    update();
  }, 1200);
}
</script>
</body>
</html>
